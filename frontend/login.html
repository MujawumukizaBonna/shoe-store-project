<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - New Shoes Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #2d5016, #4a7c59);
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4a7c59, #90EE90);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 2rem;
        }

        .auth-header h1 {
            color: #2d5016;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .auth-header p {
            color: #666;
        }

        /* Role Toggle */
        .role-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #f5f5f5;
            padding: 0.5rem;
            border-radius: 10px;
        }

        .role-toggle button {
            flex: 1;
            padding: 0.75rem 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: white;
            color: #666;
        }

        .role-toggle button i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }

        .role-toggle button:hover {
            background: #e0e0e0;
        }

        .role-toggle button.active {
            color: white;
            transform: scale(1.05);
        }

        .role-toggle button.active.customer-role {
            background: linear-gradient(135deg, #4a7c59, #90EE90);
        }

        .role-toggle button.active.seller-role {
            background: linear-gradient(135deg, #ff8800, #ffaa00);
        }

        .role-toggle button.active.admin-role {
            background: linear-gradient(135deg, #ff4444, #ff6666);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #2d5016;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4a7c59;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #90EE90;
            box-shadow: 0 0 0 3px rgba(144, 238, 144, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password a {
            color: #4a7c59;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a7c59, #90EE90);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 124, 89, 0.4);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            color: #666;
        }

        .auth-links {
            text-align: center;
            font-size: 0.95rem;
        }

        .auth-links a {
            color: #4a7c59;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 1rem;
        }

        .back-home a {
            color: #666;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .back-home a:hover {
            color: #4a7c59;
        }

        .error-message {
            background: #ffe0e0;
            border: 1px solid #ffb3b3;
            color: #cc0000;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: #e0ffe0;
            border: 1px solid #b3ffb3;
            color: #006600;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        /* Input field fix */
input {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    padding: 0.75rem;
}

.form-group {
    width: 100%;
}

.form-group input {
    width: 100%;
    box-sizing: border-box;
}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-shoe-prints"></i>
                </div>
                <h1>Welcome Back!</h1>
                <p>Login to your account</p>
            </div>

            <!-- Role Toggle -->
            <div class="role-toggle">
                <button type="button" id="customerBtn" class="active customer-role" onclick="switchRole('customer')">
                    <i class="fas fa-user"></i>
                    <span>Customer</span>
                </button>
                <button type="button" id="sellerBtn" class="seller-role" onclick="switchRole('seller')">
                    <i class="fas fa-store"></i>
                    <span>Seller</span>
                </button>
                <button type="button" id="adminBtn" class="admin-role" onclick="switchRole('admin')">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </button>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required placeholder="your.email@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="Enter your password">
                        <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="auth-links">
                Don't have an account? <a href="register.html">Sign Up</a><br>
                <a href="seller-register.html" style="margin-top: 0.5rem; display: inline-block;">Become a Seller</a>
            </div>

            <div class="back-home">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://shoestoreproject.vercel.app/api';
        let selectedRole = 'customer';

        // Switch between customer, seller, and admin login
        function switchRole(role) {
            selectedRole = role;
            
            // Remove active from all buttons
            document.getElementById('customerBtn').classList.remove('active');
            document.getElementById('sellerBtn').classList.remove('active');
            document.getElementById('adminBtn').classList.remove('active');
            
            // Add active to selected button
            if (role === 'customer') {
                document.getElementById('customerBtn').classList.add('active');
            } else if (role === 'seller') {
                document.getElementById('sellerBtn').classList.add('active');
            } else {
                document.getElementById('adminBtn').classList.add('active');
            }                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            // Validate input
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await fetch(`${API_BASE_URL}/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    // Check if user role matches selected role
                    if (selectedRole === 'admin' && result.user.role !== 'admin') {
                        showError('This account is not an admin account.');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                        return;
                    }

                    if (selectedRole === 'seller' && result.user.role !== 'seller') {
                        showError('This account is not a seller account. Please register as a seller first.');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                        return;
                    }

                    if (selectedRole === 'customer' && (result.user.role === 'admin' || result.user.role === 'seller')) {
                        showError(`Please use the ${result.user.role.charAt(0).toUpperCase() + result.user.role.slice(1)} login option.`);
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                        return;
                    }

                    // Save token and user data
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('userData', JSON.stringify(result.user));

                    showSuccess('Login successful! Redirecting...');

                    // Redirect based on role
                    setTimeout(() => {
                        if (result.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else if (result.user.role === 'seller') {
                            window.location.href = 'seller-dashboard.html';
                        } else {
                            window.location.href = 'customer-dashboard.html';
                        }
                    }, 1500);
                } else {
                    showError(result.message || 'Invalid email or password');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Unable to connect to server. Please make sure the backend is running.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                if (userData.role === 'admin') {
                    window.location.href = 'admin.html';
                } else if (userData.role === 'seller') {
                    window.location.href = 'seller-dashboard.html';
                } else {
                    window.location.href = 'customer-dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
