<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - New Shoes Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #2d5016, #4a7c59);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            color: #2d5016;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .cart-items {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cart-summary {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 1.5rem;
            padding: 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            border-color: #90EE90;
            box-shadow: 0 5px 15px rgba(74, 124, 89, 0.2);
        }

        .item-image {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #4a7c59, #90EE90);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-image i {
            font-size: 3rem;
            color: white;
        }

        .item-details h3 {
            color: #2d5016;
            margin-bottom: 0.5rem;
        }

        .item-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4a7c59;
            margin-bottom: 0.5rem;
        }

        .item-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border: 2px solid #4a7c59;
            background: white;
            color: #4a7c59;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .qty-btn:hover {
            background: #4a7c59;
            color: white;
        }

        .qty-display {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .item-actions {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }

        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }

        .item-total {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d5016;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-total {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d5016;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 3px solid #4a7c59;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a7c59, #90EE90);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 124, 89, 0.4);
        }

        .continue-shopping {
            width: 100%;
            background: white;
            color: #4a7c59;
            border: 2px solid #4a7c59;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.3s ease;
        }

        .continue-shopping:hover {
            background: #4a7c59;
            color: white;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-cart i {
            font-size: 5rem;
            color: #ccc;
            margin-bottom: 1rem;
        }

        .back-btn {
            background: white;
            color: #2d5016;
            border: 2px solid #2d5016;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #2d5016;
            color: white;
        }

        .clear-cart-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .clear-cart-btn:hover {
            background: #c82333;
        }

        @media (max-width: 968px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
            }

            .cart-item {
                grid-template-columns: 100px 1fr;
            }

            .item-actions {
                grid-column: 1 / -1;
                flex-direction: row;
                justify-content: space-between;
                margin-top: 1rem;
            }
        }

        @media (max-width: 580px) {
            .cart-item {
                grid-template-columns: 1fr;
            }

            .item-image {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h1><i class="fas fa-shopping-cart"></i> Shopping Cart</h1>
                <p style="color: #666; margin-top: 0.5rem;"><span id="itemCount">0</span> items in your cart</p>
            </div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <button class="clear-cart-btn" onclick="clearCart()" id="clearBtn" style="display: none;">
                    <i class="fas fa-trash"></i> Clear Cart
                </button>
                <a href="customer-dashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>
        </div>

        <!-- Cart Content -->
        <div class="cart-container" id="cartContainer">
            <!-- Cart Items -->
            <div class="cart-items">
                <h2 style="color: #2d5016; margin-bottom: 1.5rem;">
                    <i class="fas fa-box"></i> Your Items
                </h2>
                <div id="cartItemsContainer"></div>
            </div>

            <!-- Cart Summary -->
            <div class="cart-summary" id="cartSummary" style="display: none;">
                <h2 style="color: #2d5016; margin-bottom: 1.5rem;">
                    <i class="fas fa-receipt"></i> Order Summary
                </h2>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="color: #4a7c59; font-weight: 600;">FREE</span>
                </div>
                <div class="summary-row">
                    <span>Tax (0%)</span>
                    <span id="tax">$0.00</span>
                </div>
                
                <div class="summary-total summary-row">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>

                <button class="checkout-btn" onclick="goToCheckout()">
                    <i class="fas fa-credit-card"></i> Proceed to Checkout
                </button>

                <a href="index.html" class="continue-shopping">
                    <i class="fas fa-shopping-bag"></i> Continue Shopping
                </a>
            </div>
        </div>
    </div>

    <script>
        // Get cart from localStorage
        let cart = JSON.parse(localStorage.getItem('shoeStoreCart') || '[]');

        // Display cart on load
        displayCart();

        function displayCart() {
            const container = document.getElementById('cartItemsContainer');
            const itemCount = document.getElementById('itemCount');
            const clearBtn = document.getElementById('clearBtn');
            const cartSummary = document.getElementById('cartSummary');

            itemCount.textContent = cart.length;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Your cart is empty</h2>
                        <p style="margin-top: 1rem; margin-bottom: 2rem;">Add some awesome shoes to get started!</p>
                        <a href="index.html" class="checkout-btn" style="display: inline-block; text-decoration: none;">
                            <i class="fas fa-shopping-bag"></i> Browse Products
                        </a>
                    </div>
                `;
                clearBtn.style.display = 'none';
                cartSummary.style.display = 'none';
                return;
            }

            clearBtn.style.display = 'inline-block';
            cartSummary.style.display = 'block';

            // Display cart items
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="item-image">
                        ${item.image 
                            ? `<img src="${item.image}" alt="${item.name}">`
                            : `<i class="fas fa-shoe-prints"></i>`
                        }
                    </div>
                    
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                        ${item.size ? `<div class="item-meta"><i class="fas fa-ruler"></i> Size: ${item.size}</div>` : ''}
                        ${item.color ? `<div class="item-meta"><i class="fas fa-palette"></i> Color: ${item.color}</div>` : ''}
                        
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">
                                <i class="fas fa-minus"></i>
                            </button>
                            <div class="qty-display">${item.quantity}</div>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div class="item-actions">
                        <button class="remove-btn" onclick="removeItem(${index})">
                            <i class="fas fa-trash"></i> Remove
                        </button>
                        <div class="item-total">$${(item.price * item.quantity).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');

            // Update summary
            updateSummary();
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                removeItem(index);
                return;
            }

            saveCart();
            displayCart();
        }

        function removeItem(index) {
            if (confirm('Remove this item from cart?')) {
                cart.splice(index, 1);
                saveCart();
                displayCart();
            }
        }

        function clearCart() {
            if (confirm('Are you sure you want to clear your entire cart?')) {
                cart = [];
                saveCart();
                displayCart();
            }
        }

        function saveCart() {
            localStorage.setItem('shoeStoreCart', JSON.stringify(cart));
        }

        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = 0; // You can add tax calculation here
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('tax').textContent = '$' + tax.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
        }

        function goToCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
