<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - New Shoes Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d5016, #4a7c59);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title h1 {
            color: #2d5016;
            margin-bottom: 0.5rem;
        }

        .header-title p {
            color: #666;
        }

        .logout-btn {
            background: #ff4444;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #cc0000;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #2d5016;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: #90EE90;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #4a7c59;
            color: white;
        }

        .panel {
            display: none;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel.active {
            display: block;
        }

        /* IMAGE PREVIEW STYLES - NEW! */
        .image-upload-wrapper {
            border: 3px dashed #4a7c59;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f5f5f5;
        }

        .image-upload-wrapper:hover {
            border-color: #90EE90;
            background: #e0ffe0;
        }

        .image-upload-wrapper.has-image {
            border-style: solid;
            padding: 0;
        }

        #imagePreview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 15px;
            display: none;
        }

        #imagePreview.show {
            display: block;
        }

        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: #666;
        }

        .upload-placeholder i {
            font-size: 3rem;
            color: #4a7c59;
        }

        .remove-image-btn {
            display: none;
            margin-top: 1rem;
            background: #ff4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-image-btn.show {
            display: inline-block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d5016;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #90EE90;
            box-shadow: 0 0 0 3px rgba(144, 238, 144, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #4a7c59, #90EE90);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 124, 89, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .product-image-container {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #4a7c59, #90EE90);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-image-container .no-image {
            color: white;
            font-size: 3rem;
        }

        .product-info {
            padding: 1rem;
        }

        .product-info h3 {
            color: #2d5016;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a7c59;
            margin-bottom: 0.5rem;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-edit, .btn-delete {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #ffa500;
            color: white;
        }

        .btn-delete {
            background: #ff4444;
            color: white;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4a7c59;
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Orders Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #4a7c59;
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <h1><i class="fas fa-cog"></i> Admin Dashboard</h1>
                <p>Manage your shoe store</p>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showPanel('products')">
                <i class="fas fa-box"></i> Products
            </button>
            <button class="tab-btn" onclick="showPanel('orders')">
                <i class="fas fa-shopping-cart"></i> Orders
            </button>
        </div>

        <!-- Products Panel -->
        <div id="productsPanel" class="panel active">
            <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
            
            <form id="productForm">
                <!-- Image Upload with Preview -->
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Product Image *</label>
                    <div class="image-upload-wrapper" id="imageUploadWrapper" onclick="document.getElementById('productImage').click()">
                        <input type="file" id="productImage" accept="image/*" style="display: none;" required>
                        <img id="imagePreview" alt="Preview">
                        <div class="upload-placeholder" id="uploadPlaceholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p><strong>Click to upload image</strong></p>
                            <p style="font-size: 0.85rem;">PNG, JPG, GIF up to 5MB</p>
                        </div>
                    </div>
                    <button type="button" class="remove-image-btn" id="removeImageBtn" onclick="removeImage()">
                        <i class="fas fa-times"></i> Remove Image
                    </button>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Product Name *</label>
                    <input type="text" id="productName" required placeholder="e.g., Nike Air Max">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Price *</label>
                    <input type="number" id="productPrice" step="0.01" required placeholder="e.g., 99.99">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="productDescription" rows="3" placeholder="Product description..."></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select id="productCategory">
                        <option value="Running">Running</option>
                        <option value="Casual">Casual</option>
                        <option value="Sports">Sports</option>
                        <option value="Formal">Formal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-ruler"></i> Sizes (comma separated)</label>
                    <input type="text" id="productSize" placeholder="e.g., 7, 8, 9, 10">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-palette"></i> Colors (comma separated)</label>
                    <input type="text" id="productColor" placeholder="e.g., Black, White, Red">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-boxes"></i> Stock Quantity</label>
                    <input type="number" id="productStock" value="0" min="0">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </form>

            <hr style="margin: 2rem 0; border: none; border-top: 2px solid #e0e0e0;">

            <h2><i class="fas fa-list"></i> All Products</h2>
            <div id="productsContainer" class="products-grid">
                <p style="text-align: center; color: #666;">Loading products...</p>
            </div>
        </div>

        <!-- Orders Panel -->
        <div id="ordersPanel" class="panel">
            <h2><i class="fas fa-shopping-cart"></i> All Orders</h2>
            <div id="ordersContainer">
                <p style="text-align: center; color: #666;">Loading orders...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let selectedFile = null;

        // Check admin authentication
        const token = localStorage.getItem('authToken');
        const userData = JSON.parse(localStorage.getItem('userData') || '{}');

        if (!token || userData.role !== 'admin') {
            alert('Access denied. Admin only!');
            window.location.href = 'login.html';
        }

        // Image Preview Handler - NEW!
        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Validate file size
                if (file.size > 5 * 1024 * 1024) {
                    alert('Image size must be less than 5MB');
                    return;
                }

                // Validate file type
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file');
                    return;
                }

                selectedFile = file;

                // Show preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    const placeholder = document.getElementById('uploadPlaceholder');
                    const wrapper = document.getElementById('imageUploadWrapper');
                    const removeBtn = document.getElementById('removeImageBtn');

                    preview.src = e.target.result;
                    preview.classList.add('show');
                    placeholder.style.display = 'none';
                    wrapper.classList.add('has-image');
                    removeBtn.classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });

        // Remove Image Function
        function removeImage() {
            event.stopPropagation();
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('uploadPlaceholder');
            const wrapper = document.getElementById('imageUploadWrapper');
            const removeBtn = document.getElementById('removeImageBtn');
            const fileInput = document.getElementById('productImage');

            preview.src = '';
            preview.classList.remove('show');
            placeholder.style.display = 'flex';
            wrapper.classList.remove('has-image');
            removeBtn.classList.remove('show');
            fileInput.value = '';
            selectedFile = null;
        }

        // Tab switching
        function showPanel(panelName) {
            // Remove active from all tabs and panels
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));

            // Add active to selected
            event.target.classList.add('active');
            document.getElementById(panelName + 'Panel').classList.add('active');

            // Load data
            if (panelName === 'products') {
                loadProducts();
            } else if (panelName === 'orders') {
                loadOrders();
            }
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'success' ? '#4a7c59' : '#ff4444';
            notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle"></i> ${message}`;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Add Product
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile) {
                alert('Please select an image');
                return;
            }

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('name', document.getElementById('productName').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('description', document.getElementById('productDescription').value);
            formData.append('category', document.getElementById('productCategory').value);
            
            const sizes = document.getElementById('productSize').value.split(',').map(s => s.trim()).filter(s => s);
            const colors = document.getElementById('productColor').value.split(',').map(c => c.trim()).filter(c => c);
            
            formData.append('size', JSON.stringify(sizes));
            formData.append('color', JSON.stringify(colors));
            formData.append('stock', document.getElementById('productStock').value);

            try {
                const response = await fetch(`${API_BASE_URL}/products`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showNotification('Product added successfully! ✅');
                    document.getElementById('productForm').reset();
                    removeImage();
                    loadProducts();
                } else {
                    showNotification('Failed to add product: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error adding product', 'error');
            }
        });

        // Load Products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE_URL}/products`);
                const result = await response.json();

                const container = document.getElementById('productsContainer');

                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(product => `
                        <div class="product-card">
                            <div class="product-image-container">
                                ${product.image 
                                    ? `<img src="${API_BASE_URL.replace('/api', '')}${product.image}" alt="${product.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                       <i class="fas fa-image no-image" style="display: none;"></i>`
                                    : `<i class="fas fa-image no-image"></i>`
                                }
                            </div>
                            <div class="product-info">
                                <h3>${product.name}</h3>
                                <div class="product-price">$${product.price.toFixed(2)}</div>
                                <p style="color: #666; font-size: 0.9rem;">${product.description || 'No description'}</p>
                                <p style="color: #666; font-size: 0.85rem; margin-top: 0.5rem;">
                                    <strong>Stock:</strong> ${product.stock} | 
                                    <strong>Category:</strong> ${product.category}
                                </p>
                                <div class="product-actions">
                                    <button class="btn-delete" onclick="deleteProduct('${product._id}')">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #666;">No products yet. Add your first product above!</p>';
                }
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsContainer').innerHTML = '<p style="text-align: center; color: #ff4444;">Error loading products</p>';
            }
        }

        // Delete Product
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/products/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showNotification('Product deleted successfully');
                    loadProducts();
                } else {
                    showNotification('Failed to delete product', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error deleting product', 'error');
            }
        }

        // Load Orders
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE_URL}/orders`);
                const result = await response.json();

                const container = document.getElementById('ordersContainer');

                if (result.success && result.data.length > 0) {
                    container.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${result.data.map(order => `
                                    <tr>
                                        <td>#${order._id.slice(-8)}</td>
                                        <td>${order.customerName}</td>
                                        <td>$${order.totalAmount.toFixed(2)}</td>
                                        <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                                        <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                                        <td>
                                            <button class="btn-delete" onclick="deleteOrder('${order._id}')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #666;">No orders yet</p>';
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // Delete Order
        async function deleteOrder(id) {
            if (!confirm('Are you sure you want to delete this order?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/orders/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showNotification('Order deleted successfully');
                    loadOrders();
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error deleting order', 'error');
            }
        }

        // Logout
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('userData');
                window.location.href = 'login.html';
            }
        }

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
